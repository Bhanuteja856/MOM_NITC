<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Sign Up - NITC Alumni Network</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <div class="container">
    <!-- Shared Header will be injected here -->
    <div id="header-placeholder" data-header="/Headers_Footers_common/header.html"></div>

    <h2>Create Account</h2>

    <div id="message" class="message"></div>

    <!-- Step 1: Roll Number Verification -->
    <div id="step1">
      <div class="info-box">
        Enter your Nitc roll number to verify you are an MCA alumnies.
      </div>
      <div class="form-group">
        <label>Roll Number</label>
        <input type="text" id="rollNumber" placeholder="e.g., M010111CA" required>
      </div>
      <button class="btn" id="verifyRollBtn">Verify Roll Number</button>
    </div>

    <!-- Step 2: Email & Password -->
    <div id="step2" style="display:none;">
      <div class="info-box">
        Hello <b id="alumniName"></b>! Set up your login credentials.
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="your@email.com" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div style="position: relative;">
          <input type="password" id="password" placeholder="At least 6 characters" required
            style="width: 100%; box-sizing: border-box; padding-right: 40px;">
          <span
            onclick="var input = this.previousElementSibling; var isPass = input.type === 'password'; input.type = isPass ? 'text' : 'password'; this.querySelector('.eye-open').style.display = isPass ? 'none' : 'block'; this.querySelector('.eye-closed').style.display = isPass ? 'block' : 'none';"
            style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; display: flex; align-items: center; color: #666;">
            <svg class="eye-open" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
            <svg class="eye-closed" style="display: none;" width="18" height="18" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path
                d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24">
              </path>
              <line x1="1" y1="1" x2="23" y2="23"></line>
            </svg>
          </span>
        </div>
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <div style="position: relative;">
          <input type="password" id="confirmPassword" placeholder="Re-enter password" required
            style="width: 100%; box-sizing: border-box; padding-right: 40px;">
          <span
            onclick="var input = this.previousElementSibling; var isPass = input.type === 'password'; input.type = isPass ? 'text' : 'password'; this.querySelector('.eye-open').style.display = isPass ? 'none' : 'block'; this.querySelector('.eye-closed').style.display = isPass ? 'block' : 'none';"
            style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; display: flex; align-items: center; color: #666;">
            <svg class="eye-open" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
            <svg class="eye-closed" style="display: none;" width="18" height="18" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path
                d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24">
              </path>
              <line x1="1" y1="1" x2="23" y2="23"></line>
            </svg>
          </span>
        </div>
      </div>
      <button class="btn" id="signupBtn">Sign Up & Send OTP</button>
    </div>

    <p class="link-text">Already have an account? <a href="login.html">Login</a></p>
    <p class="link-text"><a href="legacy-signup.html">Forgot your Roll Number? Register here</a></p>
    <p class="link-text"><a href="index.html">Back to Home</a></p>
  </div>

  <script src="js/load-components.js"></script>
  <script src="js/3d-effects.js" defer></script>
  <script src="js/signup.js"></script>
</body>

</html>
