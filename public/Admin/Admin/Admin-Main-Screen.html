<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Main Screen - NITC</title>
    <link rel="stylesheet" href="../CSS/AdminStyling.css">
    <link rel="stylesheet" href="../CSS/Admin-main-screen.css">
    <style>
        /* Enhanced Searchable Filter UI */
        .searchable-filter-container { position: relative; }
        .searchable-filter-input {
            width: 100%; padding: 10px 35px 10px 12px !important; border: 1px solid #ccc !important; border-radius: 6px !important;
            box-sizing: border-box; font-family: inherit; font-size: 0.95em; transition: all 0.2s;
            background-color: #fff !important;
        }
        .searchable-filter-input:focus {
            outline: none; border-color: #0D8ABC !important; box-shadow: 0 0 0 3px rgba(13, 138, 188, 0.15) !important;
        }
        .filter-chevron {
            position: absolute; right: 12px; top: 50%; transform: translateY(-50%); pointer-events: none; color: #999; transition: transform 0.2s; width: 16px; height: 16px;
        }
        .searchable-filter-input:focus ~ .filter-chevron { transform: translateY(-50%) rotate(180deg); color: #0D8ABC; }
        .searchable-filter-clear {
            position: absolute; right: 35px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #999; display: none; width: 16px; height: 16px; font-weight:bold; text-align:center; line-height:16px; z-index: 10;
        }
        .searchable-filter-clear:hover { color: #dc3545; }
        .searchable-filter-list {
            display: none; position: absolute; background-color: white; border: 1px solid #eee;
            max-height: 220px; overflow-y: auto; width: 100%; box-sizing: border-box; z-index: 1000;
            border-radius: 6px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-top: 4px;
        }
        .searchable-filter-list::-webkit-scrollbar { width: 6px; }
        .searchable-filter-list::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        .searchable-filter-list::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }
        .searchable-filter-list div {
            padding: 10px 12px; cursor: pointer; color: #333; font-size: 0.9em; border-bottom: 1px solid #f9f9f9; transition: background 0.1s;
        }
        .searchable-filter-list div:last-child { border-bottom: none; }
        .searchable-filter-list div:hover { background-color: #f0f7ff; color: #0D8ABC; }
        .searchable-filter-list div strong { color: #0D8ABC; font-weight: 800; }
        
        .dark-mode .searchable-filter-input { background-color: #2c2c2c !important; border-color: #444 !important; color: #e0e0e0 !important; }
        .dark-mode .searchable-filter-input:focus { border-color: #60a5fa !important; box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.15) !important; }
        .dark-mode .searchable-filter-list { background-color: #2c2c2c; border-color: #444; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .dark-mode .searchable-filter-list div { color: #e0e0e0; border-bottom-color: #333; }
        .dark-mode .searchable-filter-list div:hover { background-color: #3d3d3d; color: #60a5fa; }
        .dark-mode .searchable-filter-list div strong { color: #60a5fa; }
        .dark-mode .filter-chevron, .dark-mode .searchable-filter-clear { color: #aaa; }
    </style>
</head>
<body>
    <!-- Shared Admin Header injected here -->
    <div id="header-placeholder" data-header="/Headers_Footers_common/header-admin.html"></div>
    <script src="../../js/load-components.js"></script>
    <!-- Scrolling Ticker -->
    <div class="scrolling-ticker">
        <div class="ticker-content" id="eventsTicker">
            ⭐ Upcoming Event: Annual Alumni Meet 2026 - Nov 15th &nbsp; | &nbsp; ⭐ Webinar on Tech Trends - Dec 2nd &nbsp; | &nbsp; ⭐ Registration open for Mentorship Program!
        </div>
    </div>
    <!-- Main Content Area -->
    <div class="main-container" style="max-width: 1400px; width: 96%;">       

        <!-- Left Sidebar (Filters) -->
        <div class="left-sidebar-wrapper" style="flex: 0 0 260px; margin-left: -20px; margin-right: 20px;">
            <h2 style="margin: 0 0 20px 0; color: #333; line-height: 1.3;">Alumni Directory<br><span style="font-size: 0.7em; color: #666;">(Admin View)</span></h2>
            <button id="mobileFilterToggle" class="mobile-filter-btn">Show Filters</button>

            <div class="left-sidebar" style="background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); position: sticky; top: 80px; height: calc(100vh - 140px); overflow-y: auto; box-sizing: border-box;">
                <h3 style="margin-top: 0; color: #0D8ABC; border-bottom: 2px solid #eee; padding-bottom: 10px;">Filter Alumni:</h3>
            
            <div id="batchFilterContainer" style="margin-bottom: 15px;">
                <label for="batchFilter" style="display: block; font-weight: bold; margin-bottom: 5px; color: #333;">Batch Year</label>
                <div class="searchable-filter-container">
                    <input type="text" id="batchFilter" class="searchable-filter-input" autocomplete="off" placeholder="Search batch...">
                    <span class="searchable-filter-clear" title="Clear">&times;</span>
                    <svg class="filter-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
                    <div id="batchList" class="searchable-filter-list"></div>
                </div>
            </div>
            <div id="locationFilterContainer" style="margin-bottom: 15px;">
                <label for="locationFilter" style="display: block; font-weight: bold; margin-bottom: 5px; color: #333;">Location (City)</label>
                <div class="searchable-filter-container">
                    <input type="text" id="locationFilter" class="searchable-filter-input" autocomplete="off" placeholder="Search location...">
                    <span class="searchable-filter-clear" title="Clear">&times;</span>
                    <svg class="filter-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
                    <div id="locationList" class="searchable-filter-list"></div>
                </div>
            </div>
            
            <div id="countryFilterContainer" style="margin-bottom: 15px;">
                <label for="countryFilter" style="display: block; font-weight: bold; margin-bottom: 5px; color: #333;">Country</label>
                <div class="searchable-filter-container">
                    <input type="text" id="countryFilter" class="searchable-filter-input" autocomplete="off" placeholder="Search country...">
                    <span class="searchable-filter-clear" title="Clear">&times;</span>
                    <svg class="filter-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
                    <div id="countryList" class="searchable-filter-list"></div>
                </div>
            </div>
            
            <div id="companyFilterContainer" style="margin-bottom: 15px;">
                <label for="companyFilter" style="display: block; font-weight: bold; margin-bottom: 5px; color: #333;">Company</label>
                <div class="searchable-filter-container">
                    <input type="text" id="companyFilter" class="searchable-filter-input" autocomplete="off" placeholder="Search company...">
                    <span class="searchable-filter-clear" title="Clear">&times;</span>
                    <svg class="filter-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
                    <div id="companyList" class="searchable-filter-list"></div>
                </div>
            </div>
            <div id="designationFilterContainer" style="margin-bottom: 15px;">
                <label for="designationFilter" style="display: block; font-weight: bold; margin-bottom: 5px; color: #333;">Designation</label>
                <div class="searchable-filter-container">
                    <input type="text" id="designationFilter" class="searchable-filter-input" autocomplete="off" placeholder="Search designation...">
                    <span class="searchable-filter-clear" title="Clear">&times;</span>
                    <svg class="filter-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
                    <div id="designationList" class="searchable-filter-list"></div>
                </div>
            </div>
            
            <button id="resetFiltersBtn" style="width: 100%; padding: 10px; background-color: #6c757d; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; transition: background-color 0.3s;" onmouseover="this.style.backgroundColor='#5a6268'" onmouseout="this.style.backgroundColor='#6c757d'">Reset Filters</button>
            </div>
        </div>
        
        <!-- Center Content (Alumni Profiles) -->
        <div class="center-content">
            <div class="directory-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 15px;">
                <div class="search-container" style="display: flex; align-items: center; gap: 10px; flex: 1; flex-wrap: wrap; min-width: 250px;">
                    <h3 style="margin: 0; white-space: nowrap; color: #333; text-align: left;">Search Alumni:</h3>
                    <div style="position: relative; flex: 1; min-width: 200px; max-width: 100%;">
                        <input type="text" id="searchInput" placeholder="Search by name, batch, ID, email..." style="padding: 10px; padding-right: 30px; border: 1px solid #ccc; border-radius: 5px; width: 100%; box-sizing: border-box; font-family: inherit;">
                        <span id="clearSearchBtn" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #999; font-weight: bold; font-size: 1.2em; display: none;" title="Clear search">&times;</span>
                    </div>
                </div>
                <div class="dashboard-action-btns" style="display: flex; gap: 10px; flex-wrap: wrap;">
                    <!-- <button onclick="window.location.href='Admin-Videos.html'" style="background: #2e7d32; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; white-space: nowrap;">Manage Videos</button> -->
                    <button onclick="window.location.href='Manage-Alumni-Admin.html'" style="background: #0D8ABC; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; white-space: nowrap;">Manage Alumni</button>
                </div>
            </div>
            <div class="profiles-grid" id="alumniGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px;">
                <!-- Alumni will be dynamically populated here -->
            </div>
            
            <!-- Pagination Controls -->
            <div id="paginationControls" style="display: none; justify-content: center; align-items: center; gap: 15px; margin-top: 30px; margin-bottom: 20px;">
                <button id="prevPageBtn" style="padding: 8px 18px; background: #c62828; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 1.2em; transition: opacity 0.3s;">&#8592;</button>
                <span id="pageInfo" style="font-weight: bold; color: #333; min-width: 100px; text-align: center;">Page 1 of 1</span>
                <button id="nextPageBtn" style="padding: 8px 18px; background: #c62828; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 1.2em; transition: opacity 0.3s;">&#8594;</button>
            </div>
        </div>
        <!-- Right Sidebar (Announcements) -->
        <div class="right-sidebar">
            <h3><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:6px;"><path d="m3 11 18-9v18L3 13"/><path d="M11.6 16.8a3 3 0 1 1-5.8-1.6"/></svg>Admin Announcements</h3>
            <div id="announcementsList">
                <p style="color: #666; font-style: italic;">Loading announcements...</p>
            </div>
        </div>
    </div>

    <!-- Footer is loaded here dynamically -->
    <div id="footer-placeholder"></div>

    <!-- Load the Master Page Script -->
    <script src="../../js/load-components.js"></script>
    <script>
        const API_URL = window.API_URL;

        document.addEventListener('DOMContentLoaded', () => {
            if (!checkAccess()) return;

            document.addEventListener('HeaderLoaded', () => {
                const storedUser = localStorage.getItem('adminUser');          
                if (storedUser) {
                    try {
                        const user = JSON.parse(storedUser);
                        if (user && user.name) {
                            document.getElementById('headerProfilePic').src = user.profileImage || `https://ui-avatars.com/api/?name=${encodeURIComponent(user.name)}&background=c62828&color=fff`;
                        }
                    } catch(e) {}
                }
            });
            // ==========================================
            // LOAD ALUMNI DIRECTORY
            // ==========================================
            let alumniCache = [];
            let currentFilteredList = [];
            let currentPage = 1;
            const cardsPerPage = 9;
            const alumniGrid = document.getElementById('alumniGrid');

            async function loadAlumniDirectory() {
                try {
                    const response = await fetch(`${API_URL}/users`, {
                        method: 'GET',
                        headers: {
                            'Authorization': `Bearer ${localStorage.getItem('adminToken')}`
                        }
                    });
                    const data = await response.json();
                    if (response.ok && data.success) {
                        const alumniList = data.users.filter(u => u.userType === 'alumni' && (!u.rollNumber || !u.rollNumber.startsWith('PENDING-')));                        
                        alumniCache = alumniList;
                        currentFilteredList = [...alumniCache];
                        populateFilters(alumniCache);
                        renderAlumni(currentFilteredList, 1);
                    }
                } catch (error) {
                    console.error("Failed to load alumni directory", error);
                }
            }

            function renderAlumni(list, page = 1) {
                currentPage = page;
                alumniGrid.innerHTML = '';                       
                if (list.length === 0) {
                    alumniGrid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #666; padding: 20px;">No alumni found matching your search.</p>';
                    document.getElementById('paginationControls').style.display = 'none';
                    return;
                }
                
                const totalPages = Math.ceil(list.length / cardsPerPage);
                if (currentPage > totalPages) currentPage = totalPages;
                if (currentPage < 1) currentPage = 1;
                
                const startIndex = (currentPage - 1) * cardsPerPage;
                const endIndex = startIndex + cardsPerPage;
                const paginatedList = list.slice(startIndex, endIndex);
                
                paginatedList.forEach(alumni => {
                            const card = document.createElement('div');
                            card.className = 'profile-card';
                            card.style.padding = '15px'; // Reduced padding
                            const imgSrc = alumni.profileImage || `https://ui-avatars.com/api/?name=${encodeURIComponent(alumni.name)}&background=random`;                           
                            card.innerHTML = `
                                <div style="background: #0D8ABC; color: white; padding: 2px 8px; border-radius: 4px; display: inline-block; margin-bottom: 10px; font-size: 0.8em; font-weight: bold;">ALUMNI</div>
                                <img src="${imgSrc}" alt="${escapeHtml(alumni.name)}" style="width: 80px; height: 80px; border-radius: 50%; object-fit: cover; margin: 0 auto 10px auto; display: block; border: 2px solid #f0f0f0;">
                                <h3 style="margin: 5px 0; font-size: 1.1em; text-align: center; display: flex; align-items: center; justify-content: center;">${escapeHtml(alumni.name)} <svg style="width: 16px; height: 16px; margin-left: 5px;" viewBox="0 0 24 24" fill="#28a745" title="Verified Alumni"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg></h3>
                                <p style="margin: 3px 0; font-size: 0.85em; text-align: center; color: #555;">Batch: ${escapeHtml(alumni.batchYear)}</p>
                                <p style="margin: 3px 0; font-size: 0.85em; text-align: center; color: #0D8ABC; word-break: break-all;">${escapeHtml(alumni.email)}</p>
                                <div class="card-actions" style="margin-top: 12px;">
                                    <button class="details-btn" onclick="window.location.href='../../Alumni/Alumni-View-Details.html?id=${alumni._id}'">View Details</button>
                                    <div class="btn-group-horizontal">
                                        <button class="edit-btn" onclick="window.location.href='Edit-Alumni.html?id=${alumni._id}'">Edit</button>
                                        <button class="delete-btn" onclick="deleteAlumni('${alumni._id}')">Remove</button>
                                    </div>
                                </div>
                            `;
                            alumniGrid.appendChild(card);
                        });
                        
                // Update Pagination UI
                document.getElementById('paginationControls').style.display = 'flex';
                document.getElementById('pageInfo').textContent = `Page ${currentPage} of ${totalPages}`;
                
                const prevBtn = document.getElementById('prevPageBtn');
                const nextBtn = document.getElementById('nextPageBtn');
                
                prevBtn.disabled = currentPage === 1;
                prevBtn.style.opacity = currentPage === 1 ? '0.5' : '1';
                prevBtn.style.cursor = currentPage === 1 ? 'not-allowed' : 'pointer';
                
                nextBtn.disabled = currentPage === totalPages;
                nextBtn.style.opacity = currentPage === totalPages ? '0.5' : '1';
                nextBtn.style.cursor = currentPage === totalPages ? 'not-allowed' : 'pointer';
            }
            
            document.getElementById('prevPageBtn').addEventListener('click', () => {
                if (currentPage > 1) {
                    renderAlumni(currentFilteredList, currentPage - 1);
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            });
            
            document.getElementById('nextPageBtn').addEventListener('click', () => {
                const totalPages = Math.ceil(currentFilteredList.length / cardsPerPage);
                if (currentPage < totalPages) {
                    renderAlumni(currentFilteredList, currentPage + 1);
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            });

            function populateFilters(list) {
                const batchList = document.getElementById('batchList');
                const locationList = document.getElementById('locationList');
                const companyList = document.getElementById('companyList');
                const designationList = document.getElementById('designationList');
                const countryList = document.getElementById('countryList');
                
                const batches = [...new Set(list.map(a => a.batchYear).filter(Boolean))].sort((a,b) => b - a);
                const locations = [...new Set(list.map(a => a.city).filter(Boolean))].sort();
                const companies = [...new Set(list.map(a => a.currentCompany).filter(Boolean))].sort();
                const designations = [...new Set(list.map(a => a.designation).filter(Boolean))].sort();
                const countries = [...new Set(list.map(a => a.country).filter(Boolean))].sort();
                
                const updateList = (listElement, items, inputId) => {
                    if (!listElement) return;
                    listElement.innerHTML = items.map(item => `<div data-value="${escapeHtml(String(item))}">${escapeHtml(String(item))}</div>`).join('');
                    listElement.querySelectorAll('div').forEach(div => {
                        div.addEventListener('click', function() {
                            const input = document.getElementById(inputId);
                            input.value = this.getAttribute('data-value');
                            listElement.style.display = 'none';
                            input.dispatchEvent(new Event('input'));
                        });
                    });
                };

                updateList(batchList, batches, 'batchFilter');
                updateList(locationList, locations, 'locationFilter');
                updateList(companyList, companies, 'companyFilter');
                updateList(designationList, designations, 'designationFilter');
                updateList(countryList, countries, 'countryFilter');
            }

            function applyFilters() {
                const searchTerm = document.getElementById('searchInput').value.toLowerCase();
                const selectedBatch = document.getElementById('batchFilter').value;
                const selectedLocation = document.getElementById('locationFilter').value;
                const selectedCompany = document.getElementById('companyFilter').value;
                const selectedDesignation = document.getElementById('designationFilter').value;
                const selectedCountry = document.getElementById('countryFilter').value;
                
                const clearBtn = document.getElementById('clearSearchBtn');
                if (clearBtn) clearBtn.style.display = searchTerm ? 'block' : 'none';

                const filtered = alumniCache.filter(a => {
                    const searchString = `${a.name || ''} ${a.batchYear || ''} ${a.email || ''} ${a.currentCompany || ''} ${a.rollNumber || ''} ${a.country || ''} ${a.alumniId || ''}`.toLowerCase();
                    const matchesSearch = searchString.includes(searchTerm);
                    const matchesBatch = selectedBatch === "" || String(a.batchYear) === selectedBatch;
                    const matchesLocation = selectedLocation === "" || a.city === selectedLocation;
                    const matchesCompany = selectedCompany === "" || a.currentCompany === selectedCompany;
                    const matchesDesignation = selectedDesignation === "" || a.designation === selectedDesignation;
                    const matchesCountry = selectedCountry === "" || a.country === selectedCountry;
                    
                    return matchesSearch && matchesBatch && matchesLocation && matchesCompany && matchesDesignation && matchesCountry;
                });
                currentFilteredList = filtered;
                renderAlumni(currentFilteredList, 1);
            }

            // Setup custom searchable dropdowns with enhanced UX
            document.querySelectorAll('.searchable-filter-container').forEach(container => {
                const input = container.querySelector('.searchable-filter-input');
                const list = container.querySelector('.searchable-filter-list');
                const clearBtn = container.querySelector('.searchable-filter-clear');
                const toggleClear = () => clearBtn.style.display = input.value ? 'block' : 'none';

                input.addEventListener('focus', () => {
                    input.select();
                    list.style.display = 'block';
                    list.querySelectorAll('div').forEach(div => {
                        div.style.display = 'block';
                        div.innerHTML = escapeHtml(div.getAttribute('data-value'));
                    });
                    toggleClear();
                });
                input.addEventListener('input', () => {
                    const filter = input.value.toLowerCase();
                    list.style.display = 'block';
                    toggleClear();
                    list.querySelectorAll('div').forEach(div => {
                        const rawVal = div.getAttribute('data-value');
                        const lowerVal = rawVal.toLowerCase();
                        if (lowerVal.includes(filter)) {
                            div.style.display = 'block';
                            if (filter) {
                                const regex = new RegExp(`(${filter.replace(/[.*+?^${}()|[\\]\\]/g, '\\$&')})`, 'gi');
                                div.innerHTML = escapeHtml(rawVal).replace(regex, '<strong>$1</strong>');
                            } else div.innerHTML = escapeHtml(rawVal);
                        } else div.style.display = 'none';
                    });
                    applyFilters();
                });
                clearBtn.addEventListener('click', (e) => {
                    e.stopPropagation(); input.value = ''; toggleClear(); list.style.display = 'none'; input.dispatchEvent(new Event('input'));
                });
            });
            
            // Close dropdowns on outside click
            document.addEventListener('click', (e) => { document.querySelectorAll('.searchable-filter-container').forEach(container => { if (!container.contains(e.target)) container.querySelector('.searchable-filter-list').style.display = 'none'; }); });

            document.getElementById('searchInput').addEventListener('input', applyFilters);
            
            document.getElementById('clearSearchBtn').addEventListener('click', () => {
                document.getElementById('searchInput').value = '';
                applyFilters();
            });
            
            document.getElementById('resetFiltersBtn').addEventListener('click', () => {
                document.getElementById('searchInput').value = '';
                document.getElementById('batchFilter').value = '';
                document.getElementById('locationFilter').value = '';
                document.getElementById('companyFilter').value = '';
                document.getElementById('designationFilter').value = '';
                document.getElementById('countryFilter').value = '';
                applyFilters();
            });

            window.deleteAlumni = async function(alumniId) {
                if (!confirm("Are you sure you want to permanently remove this Alumni?")) return;               
                try {
                    const response = await fetch(`${API_URL}/alumni/${alumniId}`, {
                        method: 'DELETE',
                        headers: {
                            'Authorization': `Bearer ${localStorage.getItem('adminToken')}`
                        }
                    });
                    const data = await response.json();
                    if (response.ok && data.success) {
                        loadAlumniDirectory(); // Refresh the list
                    } else {
                        alert(data.message || 'Failed to remove alumni.');
                    }
                } catch(error) {
                    console.error("Error removing alumni", error);
                }
            };
            // Load directory initially
            loadAlumniDirectory();
            updateEventsTicker();
            window.loadSideBarAnnouncements();

            // Mobile Filter Toggle
            const mobileFilterToggle = document.getElementById('mobileFilterToggle');
            if (mobileFilterToggle) {
                mobileFilterToggle.addEventListener('click', function() {
                    const sidebar = document.querySelector('.left-sidebar');
                    sidebar.classList.toggle('show-on-mobile');
                    this.textContent = sidebar.classList.contains('show-on-mobile') ? 'Hide Filters' : 'Show Filters';
                });
            }
        });
    </script>
</body>
</html>
