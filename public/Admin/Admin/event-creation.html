<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Creation - Admin Portal</title>
    <link rel="stylesheet" href="../CSS/AdminStyling.css">
    <link rel="stylesheet" href="../CSS/PostEventStyling.css">
    <link rel="stylesheet" href="../CSS/Admin-main-screen.css">
</head>
<body>

    <!-- Shared Admin Header injected here -->
    <div id="header-placeholder" data-header="/Headers_Footers_common/header-admin.html"></div>
    <script src="../../js/load-components.js"></script>
    
    <!-- Scrolling Ticker -->
    <div class="scrolling-ticker">
        <div class="ticker-content" id="eventsTicker">
            ⭐ Loading events...
        </div>
    </div>

    <!-- Main Content Area -->
    <div class="main-container">
        
        <!-- Center Content (Post Event Form) -->
        <div class="center-content">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2 style="margin: 0;">Host / Post a New Event</h2>
                <a href="Admin-Main-Screen" style="text-decoration: none; color: #c62828; font-weight: bold;">← Back to Dashboard</a>
            </div>
            
            <div id="successMessage" class="success-message">
                Event posted successfully! It has been automatically approved.
            </div>

            <div class="post-event-container" style="margin-top: 20px;">
                <form id="postEventForm" class="event-form">
                    
                    <div class="form-group">
                        <label for="eventName">Event Name *</label>
                        <input type="text" id="eventName" required placeholder="E.g., Tech Startup Networking Meetup">
                    </div>

                    <div style="display: flex; gap: 15px;">
                        <div class="form-group" style="flex: 1;">
                            <label for="eventDate">Event Date *</label>
                            <input type="date" id="eventDate" required>
                        </div>
                        <div class="form-group" style="flex: 1;">
                            <label for="eventTime">Time *</label>
                            <input type="time" id="eventTime" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="eventLocation">Location / Virtual Link *</label>
                        <input type="text" id="eventLocation" required placeholder="E.g., NITC Campus Auditorium OR Zoom Link">
                    </div>

                    <div class="form-group">
                        <label for="eventEligibility">Target Audience / Eligibility *</label>
                        <input type="text" id="eventEligibility" required placeholder="E.g., All MCA Alumni, Batch 2020-2025, Students only">
                    </div>

                    <div class="form-group">
                        <label for="eventPurpose">Purpose / Description *</label>
                        <textarea id="eventPurpose" required maxlength="750" placeholder="Describe the agenda, speakers, and purpose of this event..."></textarea>
                        <div id="purposeCharCount" style="text-align: right; font-size: 0.8em; color: #666; margin-top: 4px;">0 / 750 characters</div>
                    </div>

                    <div class="form-group">
                        <label for="eventImage">Event Banner / Picture (Optional)</label>
                        <input type="file" id="eventImage" accept="image/*">
                        <img id="imagePreview" class="image-preview" src="#" alt="Event Image Preview">
                    </div>

                    <div class="form-group">
                        <label for="eventContact">Organizer Contact Info</label>
                        <input type="text" id="eventContact" placeholder="Email or Phone number for queries">
                    </div>
                    <div>
                        <button type="submit" class="submit-btn" id="submitEventBtn" style="background-color: #c62828;">Post Event</button>
                        <button type="button" class="cancel-edit-btn" id="cancelEditBtn">Cancel Edit</button>
                    </div>
                </form>
            </div>
            <div class="my-events-section" style="margin-top: 40px;">
                <h2>My Posted Events</h2>
                <div id="myEventsList" class="my-events-list">
                    <!-- Events will be dynamically injected here -->
                </div>
            </div>
        </div>
        <!-- Right Sidebar (Announcements) -->
        <div class="right-sidebar">
            <h3><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:6px;"><path d="m3 11 18-9v18L3 13"/><path d="M11.6 16.8a3 3 0 1 1-5.8-1.6"/></svg>Admin Guidelines</h3>
            <div id="announcementsList">
                <p style="color: #666; font-style: italic;">Loading announcements...</p>
            </div>
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (!window.checkAccess()) return;
        const API_URL = window.API_URL;
            const token = localStorage.getItem('adminToken');
            const storedUser = localStorage.getItem('adminUser');
            
            // Restrict event date to today or future dates
            const eventDateInput = document.getElementById('eventDate');
            if (eventDateInput) {
                const today = new Date();
                const yyyy = today.getFullYear();
                const mm = String(today.getMonth() + 1).padStart(2, '0');
                const dd = String(today.getDate()).padStart(2, '0');
                eventDateInput.min = `${yyyy}-${mm}-${dd}`;
            }

            let currentUser = JSON.parse(storedUser);
            let localEventsCache = [];

            document.addEventListener('HeaderLoaded', () => {
                let avatarColor = 'c62828';
                if (currentUser.role === 'super_admin') avatarColor = '4a148c';
                if (currentUser.role === 'faculty') avatarColor = '0D8ABC';
                
                const pic = document.getElementById('headerProfilePic');
                if (pic) pic.src = currentUser.profileImage || `https://ui-avatars.com/api/?name=${encodeURIComponent(currentUser.name)}&background=${avatarColor}&color=fff`;    
                if (currentUser.role === 'faculty') {
                    const style = document.createElement('style');
                    style.innerHTML = `
                        #submitEventBtn, .submit-btn, .btn-primary, .btn-approve { background-color: #0D8ABC !important; }
                        #submitEventBtn:hover, .submit-btn:hover, .btn-primary:hover, .btn-approve:hover { background-color: #0b739e !important; }
                        #logoutBtn { color: #0D8ABC !important; }
                        h1, h2, h3, .page-title { color: #0D8ABC !important; }
                    `;
                    document.head.appendChild(style);        
                    // Update breadcrumb link
                    const backLinks = document.querySelectorAll('a[href="Admin-Main-Screen"]');
                    backLinks.forEach(link => {
                        link.href = '../../Alumni/Alumni-Main-Screen.html';
                        if (!link.classList.contains('cancel-btn')) {
                            link.textContent = '← Back to Dashboard';
                        }
                    });
                }    
            });
            if (currentUser.role === 'super_admin') {
                document.getElementById('submitEventBtn').style.backgroundColor = '#4a148c';
            }
            // Image Preview Logic
            const imageInput = document.getElementById('eventImage');
            const imagePreview = document.getElementById('imagePreview');
            let base64Image = null;
            let editingEventId = null;
            imageInput.addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (file) {
                    if (file.size > 5 * 1024 * 1024) {
                        alert("File is too large! Please select an image under 5MB.");
                        imageInput.value = ''; 
                        return;
                    }
                    const reader = new FileReader();
                    reader.onload = function(event) {
                        base64Image = event.target.result;
                        imagePreview.src = base64Image;
                        imagePreview.style.display = 'block';
                    }
                    reader.readAsDataURL(file);
                } else {
                    base64Image = null;
                    imagePreview.style.display = 'none';
                    imagePreview.src = '#';
                }
            });

            // Character Count for Description
            const eventPurposeTextarea = document.getElementById('eventPurpose');
            const purposeCharCountDiv = document.getElementById('purposeCharCount');
            const CHAR_LIMIT = 750;

            eventPurposeTextarea.addEventListener('input', () => {
                let charCount = eventPurposeTextarea.value.length;
                purposeCharCountDiv.textContent = `${charCount} / ${CHAR_LIMIT} characters`;

                if (charCount >= CHAR_LIMIT) {
                    purposeCharCountDiv.style.color = 'red';
                } else {
                    purposeCharCountDiv.style.color = '#666';
                }
            });
            // Form Submission Logic
            const form = document.getElementById('postEventForm');
            const successMessage = document.getElementById('successMessage');
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const submitBtn = document.getElementById('submitEventBtn');
                const originalText = submitBtn.textContent;
                submitBtn.textContent = 'Saving...';
                submitBtn.disabled = true;
                const payload = {
                    postedBy: currentUser.name + " (Admin)",
                    title: document.getElementById('eventName').value.trim(),
                    date: document.getElementById('eventDate').value,
                    time: document.getElementById('eventTime').value,
                    location: document.getElementById('eventLocation').value.trim(),
                    eligibility: document.getElementById('eventEligibility').value.trim(),
                    description: document.getElementById('eventPurpose').value.trim(),
                    contact: document.getElementById('eventContact').value.trim(),
                    image: base64Image,
                    status: 'Approved' // Pre-approve events posted by Admins
                };
                try {
                    let response;
                    if (editingEventId) {
                        response = await fetch(`${API_URL}/events/${editingEventId}`, {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                            body: JSON.stringify(payload)
                        });
                        successMessage.textContent = 'Event updated successfully!';
                    } else {
                        response = await fetch(`${API_URL}/events`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                            body: JSON.stringify(payload)
                        });
                        successMessage.textContent = 'Event posted and automatically approved!';
                    }
                    if (!response.ok && !response.headers.get('content-type')?.includes('application/json')) {
                        const text = await response.text();
                        throw new Error(`Server Error (${response.status}): ${text.substring(0, 100)}...`);
                    }
                    const data = await response.json();        
                    if (response.ok && data.success) {
                        successMessage.style.display = 'block';
                        form.reset();
                        imagePreview.style.display = 'none';
                        base64Image = null;
                        editingEventId = null;
                        document.getElementById('submitEventBtn').textContent = 'Post Event';
                        document.getElementById('cancelEditBtn').style.display = 'none';            
                        renderMyEvents();
                        updateEventsTicker(); // Refresh ticker immediately
                        setTimeout(() => successMessage.style.display = 'none', 3000);
                    } else {
                        alert(data.message || 'Failed to save event.');
                    }
                } catch (error) {
                    console.error("Error saving event:", error);
                    alert(`Error: ${error.message}. Please check the browser console for more details.`);
                } finally {
                    submitBtn.textContent = originalText;
                    submitBtn.disabled = false;
                }
            });
            document.getElementById('cancelEditBtn').addEventListener('click', () => {
                editingEventId = null;
                form.reset();
                imagePreview.style.display = 'none';
                base64Image = null;
                document.getElementById('submitEventBtn').textContent = 'Post Event';
                document.getElementById('cancelEditBtn').style.display = 'none';
            });
            async function renderMyEvents() {
                try {
                    const response = await fetch(`${API_URL}/events`);
                    const data = await response.json();   
                    if (response.ok && data.success) {
                        localEventsCache = data.events;
                        const myEvents = localEventsCache.filter(event => event.postedBy === (currentUser.name + " (Admin)"));
                        const myEventsList = document.getElementById('myEventsList');
                        myEventsList.innerHTML = '';

                        if (myEvents.length === 0) {
                            myEventsList.innerHTML = '<p class="no-events-msg" style="color: #666;">You have not posted any events yet.</p>';
                            return;
                        }
                        myEvents.forEach(event => {
                            const card = document.createElement('div');
                            card.className = 'my-event-card';
                            card.style.background = '#fff';
                            card.style.border = '1px solid #ddd';
                            card.style.padding = '15px';
                            card.style.borderRadius = '5px';
                            card.style.marginBottom = '15px';
                            card.style.display = 'flex';
                            card.style.justifyContent = 'space-between';
                            card.innerHTML = `
                                <div class="my-event-details">
                                    <h4 style="margin: 0 0 10px 0; color: #c62828;">${escapeHtml(event.title)}</h4>
                                    <p style="margin: 5px 0; font-size: 0.9em; color: #555;">Date: ${escapeHtml(event.date)} | Time: ${escapeHtml(event.time)} | Status: <strong style="color: green;">${escapeHtml(event.status)}</strong></p>
                                </div>
                                <div>
                                    <button onclick="downloadRegistrations('${event._id}')" style="background: #0D8ABC; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-right: 5px;">Get Data</button>
                                    <button onclick="editMyEvent('${event._id}')" style="background: #ffc107; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-right: 5px;">Edit</button>
                                    <button onclick="deleteMyEvent('${event._id}')" style="background: #dc3545; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-weight: bold;">Delete</button>
                                </div>
                            `;
                            myEventsList.appendChild(card);
                        });
                    }
                } catch(error) {
                    console.error("Failed to fetch events", error);
                }
            }
            window.editMyEvent = function(eventId) {
                const eventToEdit = localEventsCache.find(e => e._id === eventId);     
                if (eventToEdit) {
                    editingEventId = eventId;
                    document.getElementById('eventName').value = eventToEdit.title;
                    document.getElementById('eventDate').value = eventToEdit.date;
                    document.getElementById('eventTime').value = eventToEdit.time;
                    document.getElementById('eventLocation').value = eventToEdit.location;
                    document.getElementById('eventEligibility').value = eventToEdit.eligibility;
                    document.getElementById('eventPurpose').value = eventToEdit.description;
                    document.getElementById('eventContact').value = eventToEdit.contact;        
                    if (eventToEdit.image) {
                        base64Image = eventToEdit.image;
                        imagePreview.src = base64Image;
                        imagePreview.style.display = 'block';
                    }
                    document.getElementById('submitEventBtn').textContent = 'Update Event';
                    document.getElementById('cancelEditBtn').style.display = 'inline-block';
                    document.querySelector('.center-content').scrollIntoView({ behavior: 'smooth' });
                }
            };
            window.deleteMyEvent = async function(eventId) {
                if (confirm('Are you sure you want to delete this event?')) {
                    try {
                        const response = await fetch(`${API_URL}/events/${eventId}`, {
                            method: 'DELETE',
                            headers: { 'Authorization': `Bearer ${token}` }
                        });
                        if (response.ok) {
                            renderMyEvents();
                            updateEventsTicker();
                        }
                    } catch(error) { console.error("Error deleting event", error); }
                }
            };
            async function loadSideBarAnnouncements() {
                const announcementsList = document.getElementById('announcementsList');
                if (!announcementsList) return;
                try {
                    const currentToken = localStorage.getItem('adminToken');
                    const headers = { 'Authorization': `Bearer ${currentToken}` };
                    const response = await fetch(`${API_URL}/announcements`, { headers });
                    if (!response.ok) throw new Error('API missing');
                    const data = await response.json();
                    renderSideBarAnnouncements(data.success ? data.announcements : []);
                } catch (error) {
                    const local = JSON.parse(localStorage.getItem('adminAnnouncements')) || [];
                    renderSideBarAnnouncements(local);
                }
            }
            function renderSideBarAnnouncements(announcements) {
                const announcementsList = document.getElementById('announcementsList');
                announcementsList.innerHTML = '';
                
                const now = new Date();
                const twoDaysInMillis = 2 * 24 * 60 * 60 * 1000;
                const validAnnouncements = announcements.filter(ann => {
                    if (ann.isActive === false) return false;
                    if (!ann.expiryDate) return true;
                    const expiry = new Date(ann.expiryDate);
                    return isNaN(expiry.getTime()) || (now.getTime() <= expiry.getTime() + twoDaysInMillis);
                });

                if (validAnnouncements.length === 0) {
                    announcementsList.innerHTML = '<p style="color: #666; font-style: italic;">No new announcements.</p>';
                    return;
                }
                let htmlStr = '<marquee direction="up" scrollamount="3" onmouseover="this.stop();" onmouseout="this.start();" style="height: 100%; max-height: 400px; padding-right: 5px;">';
                // Sort newest first and limit to 5
                validAnnouncements.sort((a, b) => new Date(b.date) - new Date(a.date));
                validAnnouncements.slice(0, 5).forEach(ann => {
                    const dateStr = new Date(ann.date).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
                    htmlStr += `<div class="announcement"><h4>${escapeHtml(ann.title)}</h4><p>${escapeHtml(ann.content)}</p><span class="date">${escapeHtml(dateStr)}</span></div>`;
                });
                htmlStr += '</marquee>';
                announcementsList.innerHTML = htmlStr;
            }

            // Download Registrations CSV Function
            window.downloadRegistrations = async function(eventId) {
                const downloadToken = localStorage.getItem('token') || localStorage.getItem('adminToken') || localStorage.getItem('superAdminToken');
                try {
                    const response = await fetch(`${API_URL}/events/${eventId}/registrations/download`, {
                        headers: {
                            'Authorization': `Bearer ${downloadToken}`
                        }
                    });
                    
                    if (!response.ok) {
                        const data = await response.json().catch(() => ({}));
                        alert(data.message || 'Failed to download registrations.');
                        return;
                    }
                    
                    const blob = await response.blob();
                    const contentDisposition = response.headers.get('Content-Disposition');
                    let filename = 'event_registrations.csv';
                    if (contentDisposition && contentDisposition.includes('filename=')) {
                        const matches = contentDisposition.match(/filename="?([^"]+)"?/);
                        if (matches && matches[1]) {
                            filename = matches[1];
                        }
                    }
                    
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = filename;
                    document.body.appendChild(a);
                    a.click();
                    a.remove();
                    window.URL.revokeObjectURL(url);
                } catch (err) {
                    console.error("Download error", err);
                    alert('Error downloading file. Please check connection.');
                }
            };

            // Initial render
            renderMyEvents();
            updateEventsTicker();
            loadSideBarAnnouncements();
        });
    </script>
</body>
</html>
