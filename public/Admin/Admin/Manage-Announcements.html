<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Announcements - Admin Portal</title>
    <link rel="stylesheet" href="../CSS/AdminStyling.css">
    <link rel="stylesheet" href="../CSS/Admin-main-screen.css">
    <style>
        .form-section { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 30px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; color: #333; }
        .form-group input, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-family: inherit; }
        .submit-btn { color: white; border: none; padding: 12px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 1em; transition: opacity 0.3s; width: 100%; }
        .submit-btn:hover { opacity: 0.9; }
        .message-box { margin-bottom: 15px; padding: 10px; border-radius: 4px; display: none; font-size: 0.9em; }
        .announcement-card { background: #fff; border: 1px solid #ddd; padding: 20px; border-radius: 5px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: flex-start; }
        .announcement-details h4 { margin: 0 0 10px 0; font-size: 1.2em; color: #333; }
        .announcement-details p { margin: 5px 0; font-size: 0.95em; color: #555; line-height: 1.5; white-space: pre-wrap; }
        .announcement-details .meta { font-size: 0.8em; color: #888; display: block; margin-top: 10px; }
        .delete-btn { background: #dc3545; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .delete-btn:hover { background: #c82333; }
        .edit-btn { background: #ffc107; color: #333; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-right: 5px;}
        .edit-btn:hover { background: #e0a800; }
        @media (max-width: 768px) {
            .announcement-card { flex-direction: column; gap: 15px; }
            .announcement-actions { width: 100%; }
            form > div[style*="display: flex"] { flex-direction: column; gap: 10px !important; }
        }
    </style>
</head>
<body>

    <!-- Shared Admin Header injected here -->
    <div id="header-placeholder" data-header="/Headers_Footers_common/header-admin.html"></div>
    <script src="../../js/load-components.js"></script>

    <!-- Main Content Area -->
    <div class="main-container">
        <div class="center-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="margin: 0;">Create New Announcement</h2>
                <a href="Admin-Main-Screen.html" style="text-decoration: none; color: #0D8ABC; font-weight: bold;">← Back to Dashboard</a>
            </div>

            <div class="form-section">
                <div id="statusMessage" class="message-box"></div>
                <form id="addAnnouncementForm">
                    <div class="form-group">
                        <label>Announcement Title *</label>
                        <input type="text" id="announcementTitle" required placeholder="e.g. Scheduled System Maintenance">
                    </div>
                    <div class="form-group">
                        <label>Announcement Content *</label>
                        <textarea id="announcementContent" rows="4" required maxlength="750" placeholder="Details about the announcement..."></textarea>
                        <div id="contentCharCount" style="text-align: right; font-size: 0.8em; color: #666; margin-top: 4px;">0 / 750 characters</div>
                    </div>
                    <div style="display: flex; gap: 15px;">
                        <div class="form-group" style="flex: 1;">
                            <label>Publish Date *</label>
                            <input type="date" id="announcementDate" required>
                        </div>
                        <div class="form-group" style="flex: 1;">
                            <label>Expiry Date</label>
                            <input type="date" id="announcementExpiry">
                        </div>
                    </div>
                    <div style="display: flex; gap: 10px;">
                        <button type="submit" class="submit-btn" id="submitAnnouncementBtn">Post Announcement</button>
                        <button type="button" class="submit-btn" id="cancelEditBtn" style="display: none; background-color: #6c757d;">Cancel Edit</button>
                    </div>
                </form>
            </div>

            <h2 style="margin-bottom: 20px;">Current Announcements</h2>
            <div id="announcementsGrid">
                <!-- Announcements will be dynamically populated here -->
            </div>
        </div>
    </div>

    <script>
        const API_URL = window.API_URL;

        document.addEventListener('DOMContentLoaded', () => {
            if (!window.checkAccess()) return;
            const token = localStorage.getItem('adminToken');
            const storedUser = localStorage.getItem('adminUser');

            let currentUser = JSON.parse(storedUser);
            
            document.addEventListener('HeaderLoaded', () => {
                const avatarColor = currentUser.role === 'super_admin' ? '4a148c' : 'c62828';
                const headerProfilePic = document.getElementById('headerProfilePic');
                if (headerProfilePic) {
                    headerProfilePic.src = currentUser.profileImage || `https://ui-avatars.com/api/?name=${encodeURIComponent(currentUser.name)}&background=${avatarColor}&color=fff`;
                }
                
                if (currentUser.role === 'faculty') {
                    const style = document.createElement('style');
                    style.innerHTML = `
                        .submit-btn, .btn-primary, .btn-approve { background-color: #0D8ABC !important; }
                        .submit-btn:hover, .btn-primary:hover, .btn-approve:hover { background-color: #0b739e !important; }
                        #logoutBtn { color: #0D8ABC !important; }
                        h1, h2, h3, .page-title { color: #0D8ABC !important; }
                    `;
                    document.head.appendChild(style);
                    
                    // Update breadcrumb link
                    const backLinks = document.querySelectorAll('a[href="Admin-Main-Screen.html"]');
                    backLinks.forEach(link => {
                        link.href = '../../Alumni/Alumni-Main-Screen.html';
                        if (!link.classList.contains('cancel-btn')) {
                            link.textContent = '← Back to Dashboard';
                        }
                    });
                }
                
            });

            const submitBtn = document.getElementById('submitAnnouncementBtn');
            submitBtn.style.backgroundColor = currentUser.role === 'super_admin' ? '#4a148c' : '#c62828';
            const cancelEditBtn = document.getElementById('cancelEditBtn');
            let currentAnnouncements = [];
            let editingAnnouncementId = null;
            
            // Set today's date as default and restrict to today or future dates
            const today = new Date();
            const yyyy = today.getFullYear();
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const dd = String(today.getDate()).padStart(2, '0');
            const minDateStr = `${yyyy}-${mm}-${dd}`;
            
            const annDateInput = document.getElementById('announcementDate');
            const annExpiryInput = document.getElementById('announcementExpiry');
            
            if (annDateInput) {
                annDateInput.valueAsDate = today;
                annDateInput.min = minDateStr;
                if (annExpiryInput) {
                    annExpiryInput.min = minDateStr;
                    annDateInput.addEventListener('change', () => {
                        annExpiryInput.min = annDateInput.value;
                    });
                }
            }

            const form = document.getElementById('addAnnouncementForm');
            const statusMessage = document.getElementById('statusMessage');
            const announcementsGrid = document.getElementById('announcementsGrid');

            function showMessage(msg, isSuccess) {
                statusMessage.textContent = msg;
                statusMessage.style.display = 'block';
                statusMessage.style.backgroundColor = isSuccess ? '#d4edda' : '#f8d7da';
                statusMessage.style.color = isSuccess ? '#155724' : '#721c24';
                setTimeout(() => { statusMessage.style.display = 'none'; }, 4000);
            }

            async function loadAnnouncements() {
                try {
                    const response = await fetch(`${API_URL}/announcements`);
                    if (!response.ok) throw new Error('Endpoint not found');
                    const data = await response.json();
                    currentAnnouncements = data.success ? data.announcements : [];
                    renderAnnouncements(currentAnnouncements);
                } catch (error) {
                    // Fallback to LocalStorage if backend isn't implemented yet
                    currentAnnouncements = JSON.parse(localStorage.getItem('adminAnnouncements')) || [];
                    renderAnnouncements(currentAnnouncements);
                }
            }

            function renderAnnouncements(announcements) {
                announcementsGrid.innerHTML = '';
                
                const now = new Date();
                const twoDaysInMillis = 2 * 24 * 60 * 60 * 1000;
                const validAnnouncements = announcements.filter(ann => {
                    if (!ann.expiryDate) return true;
                    const expiry = new Date(ann.expiryDate);
                    return isNaN(expiry.getTime()) || (now.getTime() <= expiry.getTime() + twoDaysInMillis);
                });

                if (validAnnouncements.length === 0) {
                    announcementsGrid.innerHTML = '<p style="color: #666; font-style: italic;">No announcements posted yet.</p>';
                    return;
                }

                // Sort by date newest first
                validAnnouncements.sort((a, b) => new Date(b.date) - new Date(a.date));

                validAnnouncements.forEach(ann => {
                    const card = document.createElement('div');
                    card.className = 'announcement-card';
                    card.style.opacity = ann.isActive === false ? '0.6' : '1';
                    const annId = ann._id || ann.id;
                    
                    card.innerHTML = `
                        <div class="announcement-details">
                            <h4>${escapeHtml(ann.title)}</h4>
                            <p>${escapeHtml(ann.content)}</p>
                            <span class="meta">Posted by: <strong>${escapeHtml(ann.postedBy)}</strong> on ${escapeHtml(ann.date)}${ann.expiryDate ? ` | Expires on: <strong>${escapeHtml(ann.expiryDate.substring(0, 10))}</strong>` : ''}</span>
                        </div>
                        <div class="announcement-actions">
                            <div style="display: flex; gap: 5px;">
                                <button class="edit-btn" onclick="editAnnouncement('${annId}')" style="flex: 1; margin: 0;">Edit</button>
                                <button class="delete-btn" onclick="deleteAnnouncement('${annId}')" style="flex: 1;">Delete</button>
                            </div>
                            <div style="margin-top: 10px; font-size: 0.85em; background: #f9f9f9; padding: 8px; border-radius: 4px; border: 1px solid #eee; display: flex; justify-content: center; gap: 15px;">
                                <label style="cursor: pointer; font-weight: bold; color: #28a745;"><input type="radio" name="status_${annId}" value="active" ${ann.isActive !== false ? 'checked' : ''} onchange="toggleAnnouncementStatus('${annId}', true)"> ACTIVE</label>
                                <label style="cursor: pointer; font-weight: bold; color: #dc3545;"><input type="radio" name="status_${annId}" value="inactive" ${ann.isActive === false ? 'checked' : ''} onchange="toggleAnnouncementStatus('${annId}', false)"> INACTIVE</label>
                            </div>
                        </div>
                    `;
                    announcementsGrid.appendChild(card);
                });
            }
            
            window.editAnnouncement = function(id) {
                const ann = currentAnnouncements.find(a => (a._id || a.id) === id);
                if (!ann) return;
                
                editingAnnouncementId = id;
                document.getElementById('announcementTitle').value = ann.title;
                document.getElementById('announcementContent').value = ann.content;
                
                if (ann.date) {
                    const d = new Date(ann.date);
                    if (!isNaN(d.getTime())) {
                        document.getElementById('announcementDate').value = d.toISOString().split('T')[0];
                    }
                }
                
                if (ann.expiryDate) {
                    const ed = new Date(ann.expiryDate);
                    if (!isNaN(ed.getTime())) {
                        document.getElementById('announcementExpiry').value = ed.toISOString().split('T')[0];
                    }
                } else {
                    document.getElementById('announcementExpiry').value = '';
                }
                
                if (annExpiryInput && annDateInput) {
                    annExpiryInput.min = annDateInput.value;
                }
                
                document.getElementById('contentCharCount').textContent = `${ann.content.length} / 750 characters`;
                submitBtn.textContent = 'Update Announcement';
                cancelEditBtn.style.display = 'block';
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };
            
            cancelEditBtn.addEventListener('click', () => {
                editingAnnouncementId = null;
                form.reset();
                document.getElementById('announcementDate').valueAsDate = new Date();
                if (annExpiryInput && annDateInput) {
                    annExpiryInput.min = annDateInput.min;
                }
                document.getElementById('contentCharCount').textContent = '0 / 750 characters';
                submitBtn.textContent = 'Post Announcement';
                cancelEditBtn.style.display = 'none';
            });

            // Character Count for Announcement Content
            const announcementContentTextarea = document.getElementById('announcementContent');
            const contentCharCountDiv = document.getElementById('contentCharCount');
            const CHAR_LIMIT = 750;

            announcementContentTextarea.addEventListener('input', () => {
                let charCount = announcementContentTextarea.value.length;
                contentCharCountDiv.textContent = `${charCount} / ${CHAR_LIMIT} characters`;

                if (charCount >= CHAR_LIMIT) {
                    contentCharCountDiv.style.color = 'red';
                } else {
                    contentCharCountDiv.style.color = '#666';
                }
            });

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const date = document.getElementById('announcementDate').value;
                const expiryDate = document.getElementById('announcementExpiry').value;
                if (expiryDate && new Date(expiryDate) < new Date(date)) {
                    showMessage('Expiry Date cannot be earlier than the Publish Date.', false);
                    return;
                }
                submitBtn.disabled = true;
                submitBtn.textContent = editingAnnouncementId ? 'Updating...' : 'Posting...';

                const payload = {
                    title: document.getElementById('announcementTitle').value.trim(),
                    content: document.getElementById('announcementContent').value.trim(),
                    date: document.getElementById('announcementDate').value,
                    expiryDate: document.getElementById('announcementExpiry').value || undefined,
                    postedBy: currentUser.name + (currentUser.role === 'super_admin' ? ' (Super Admin)' : ' (Admin)')
                };

                if (editingAnnouncementId) {
                    const existingAnn = currentAnnouncements.find(a => (a._id || a.id) === editingAnnouncementId);
                    if (existingAnn && existingAnn.isActive !== undefined) {
                        payload.isActive = existingAnn.isActive;
                    }
                }

                try {
                    if (editingAnnouncementId) {
                        const response = await fetch(`${API_URL}/announcements/${editingAnnouncementId}`, {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                            body: JSON.stringify(payload)
                        });
                        if (!response.ok) throw new Error('API missing');
                        showMessage('Announcement updated successfully!', true);
                    } else {
                        const response = await fetch(`${API_URL}/announcements`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                            body: JSON.stringify(payload)
                        });
                        if (!response.ok) throw new Error('API missing');
                        showMessage('Announcement posted successfully!', true);
                    }
                } catch (error) {
                    // Fallback to LocalStorage
                    const local = JSON.parse(localStorage.getItem('adminAnnouncements')) || [];
                    if (editingAnnouncementId) {
                        const index = local.findIndex(a => a.id === editingAnnouncementId);
                        if (index !== -1) {
                            payload.id = editingAnnouncementId;
                            local[index] = payload;
                        }
                        showMessage('Announcement updated (saved locally)!', true);
                    } else {
                        payload.id = Date.now().toString();
                        local.push(payload);
                        showMessage('Announcement posted (saved locally)!', true);
                    }
                    localStorage.setItem('adminAnnouncements', JSON.stringify(local));
                }

                form.reset();
                document.getElementById('announcementDate').valueAsDate = new Date();
                document.getElementById('contentCharCount').textContent = '0 / 750 characters';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Post Announcement';
                cancelEditBtn.style.display = 'none';
                editingAnnouncementId = null;
                loadAnnouncements();
            });

            window.deleteAnnouncement = async function(id) {
                if (!confirm('Are you sure you want to delete this announcement?')) return;
                try {
                    await fetch(`${API_URL}/announcements/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` }});
                } catch (error) {
                    let local = JSON.parse(localStorage.getItem('adminAnnouncements')) || [];
                    local = local.filter(a => a.id !== id);
                    localStorage.setItem('adminAnnouncements', JSON.stringify(local));
                }
                loadAnnouncements();
            };
            
            window.toggleAnnouncementStatus = async function(id, isActive) {
                const ann = currentAnnouncements.find(a => (a._id || a.id) === id);
                if (!ann) return;
                
                try {
                    const response = await fetch(`${API_URL}/announcements/${id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                        body: JSON.stringify({
                            title: ann.title,
                            content: ann.content,
                            date: ann.date,
                            expiryDate: ann.expiryDate,
                            postedBy: ann.postedBy,
                            isActive: isActive 
                        })
                    });
                    if (!response.ok) throw new Error('API missing');
                    ann.isActive = isActive;
                    showMessage(`Announcement marked as ${isActive ? 'ACTIVE' : 'INACTIVE'}`, true);
                } catch (error) {
                    let local = JSON.parse(localStorage.getItem('adminAnnouncements')) || [];
                    const index = local.findIndex(a => a.id === id);
                    if (index !== -1) {
                        local[index].isActive = isActive;
                        localStorage.setItem('adminAnnouncements', JSON.stringify(local));
                        ann.isActive = isActive;
                        showMessage(`Announcement marked as ${isActive ? 'ACTIVE' : 'INACTIVE'} (saved locally)`, true);
                    }
                }
                
                renderAnnouncements(currentAnnouncements);
            };

            loadAnnouncements();
        });
    </script>
</body>
</html>
