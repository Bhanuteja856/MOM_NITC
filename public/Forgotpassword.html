<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Forgot Password - NITC Alumni Network</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <!-- Shared Header will be injected here -->
    <div id="header-placeholder" data-header="/Headers_Footers_common/header.html"></div>

    <h2>Reset Password</h2>

    <div id="message" class="message"></div>

    <!-- Step 1: Request OTP -->
    <div id="step1">
      <div class="form-group">
        <label>Registered Email Address</label>
        <input type="email" id="email" placeholder="your@email.com" required>
      </div>
      <button class="btn" id="sendOtpBtn">Send OTP</button>
    </div>

    <!-- Step 2: Verify OTP and Reset Password -->
    <div id="step2" class="hidden">
      <div class="form-group">
        <label>Enter OTP</label>
        <input type="text" id="otp" placeholder="6-digit OTP" required>
      </div>
      <div class="form-group">
        <label>New Password</label>
        <div style="position: relative;">
          <input type="password" id="newPassword" placeholder="New password" required style="width: 100%; box-sizing: border-box; padding-right: 40px;">
          <span onclick="const input = this.previousElementSibling; const isPass = input.type === 'password'; input.type = isPass ? 'text' : 'password'; this.querySelector('.eye-open').style.display = isPass ? 'none' : 'block'; this.querySelector('.eye-closed').style.display = isPass ? 'block' : 'none';" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; display: flex; align-items: center; color: #666;">
            <svg class="eye-open" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            <svg class="eye-closed" style="display: none;" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
          </span>
        </div>
      </div>
      <button class="btn" id="resetPasswordBtn">Reset Password</button>
    </div>

    <p class="link-text" style="margin-top: 20px;">Remembered your password? <a href="login.html">Login here</a></p>
    <p class="link-text" style="margin-top: 10px;"><a href="index.html">← Back to Home</a></p>
  </div>

  <script src="js/load-components.js"></script>
  <script src="js/3d-effects.js" defer></script>
  <script src="js/forgotpassword.js"></script>
</body>
</html>
